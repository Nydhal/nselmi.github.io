  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <style>
    :root{
      --text-color:#606a83;
      --bg-color:#EFEFEF;
      --card-bg:#EFEFEF;
      --shadow-dark:#dedede;
      --shadow-light:#ffffff;
      --muted-color:#6c757d;
      --icon-color:#606a83;
      --icon-hover:#4a5568;
    }
    body.dark-mode{
      --text-color:#e0e0e0;
      --bg-color:#2d2d2d;
      --card-bg:#2d2d2d;
      --shadow-dark:#1a1a1a;
      --shadow-light:#404040;
      --muted-color:#a0a0a0;
      --icon-color:#e0e0e0;
      --icon-hover:#ffffff;
    }
    body.dark-mode #n{filter:invert(1) hue-rotate(180deg);}
    body.dark-mode .card-title{color:#ffffff;}
    body{
      font-family:Georgia,serif;
      transition:all 0.3s;
      color:var(--text-color)!important;
      background:var(--bg-color)!important;
    }
    #n:hover{filter:hue-rotate(720deg);transition:all 2s;}
    .card{
      background:var(--card-bg)!important;
      box-shadow:8px 8px 16px var(--shadow-dark),-8px -8px 16px var(--shadow-light)!important;
    }
    .text-muted{color:var(--muted-color)!important;}
    .social-icon{color:var(--icon-color);transition:color 0.3s;}
    .social-icon:hover{color:var(--icon-hover);}
    #dark-toggle{position:fixed;top:20px;right:20px;border:none;background:none;font-size:24px;cursor:pointer;opacity:0.6;transition:opacity 0.3s,filter 0.3s;}
    #dark-toggle:hover{opacity:1;}
    body.dark-mode #dark-toggle{filter:invert(1);}
  </style>
</head>
<body>
<button id="dark-toggle" onclick="toggleDark()">𓂀</button>
<div class="container col-10">

    </div>
  </div>
    </div>
  </div>
  <div style="border:0;border-radius:22px;" class="card mt-4 px-3 py-2 pt-md-2 pb-md-2 mx-auto text-center">

      <a href="impossible-fractal-ca.html" style="text-decoration:none;color:inherit;">
        <h6 class="card-title" style="font-size:15px;">Emergent Impossible Fractal Geometry</h6>

</div>

<script>
function toggleDark(){
  document.body.classList.toggle('dark-mode');
  document.getElementById('dark-toggle').innerHTML=document.body.classList.contains('dark-mode')?'𓁹':'𓂀';
  localStorage.setItem('darkMode',document.body.classList.contains('dark-mode'));
}
if(localStorage.getItem('darkMode')==='true'){
  document.body.classList.add('dark-mode');
  document.getElementById('dark-toggle').innerHTML='𓁹';
}
</script>

</body></html>
